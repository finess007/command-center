<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Avia's Magic Words ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: linear-gradient(180deg, #fdf2f8 0%, #ede9fe 50%, #dbeafe 100%);
    --card: #ffffff;
    --pink: #ec4899;
    --pink-light: #fbcfe8;
    --purple: #a855f7;
    --purple-light: #e9d5ff;
    --blue: #60a5fa;
    --blue-light: #dbeafe;
    --green: #34d399;
    --green-light: #d1fae5;
    --yellow: #fbbf24;
    --yellow-light: #fef3c7;
    --red: #f87171;
    --red-light: #fee2e2;
    --orange: #fb923c;
    --text: #4c1d95;
    --text-dim: #7c3aed;
    --text-muted: #a78bfa;
    --shadow: 0 4px 20px rgba(168,85,247,0.12);
    --shadow-sm: 0 2px 8px rgba(168,85,247,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    font-family: 'Nunito', -apple-system, sans-serif;
    background: var(--bg);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    padding: 16px 16px 40px;
    max-width: 540px;
    margin: 0 auto;
    overflow-x: hidden;
  }
  body::before {
    content: '✨ 🌟 ⭐ 💫 🦋 🌸';
    position: fixed; top: 0; left: 0; right: 0;
    font-size: 1.8rem; text-align: center; padding-top: 8px;
    opacity: 0.15; pointer-events: none; z-index: 0;
    letter-spacing: 12px;
  }

  .header { text-align: center; padding: 20px 0 12px; position: relative; z-index: 1; }
  .header-photo {
    width: 140px; height: 140px; border-radius: 50%;
    object-fit: cover; object-position: center top;
    border: 4px solid #ec4899;
    box-shadow: 0 6px 25px rgba(236,72,153,0.35);
    margin-bottom: 10px;
  }
  .header h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.8rem; font-weight: 700;
    background: linear-gradient(135deg, #ec4899, #a855f7, #3b82f6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    font-family: 'Fredoka', sans-serif;
    color: var(--text-dim); font-size: 0.95rem; margin-top: 4px; font-weight: 500;
  }

  .stats-banner {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin: 14px 0; position: relative; z-index: 1;
  }
  .stat {
    text-align: center; padding: 12px 6px;
    background: var(--card); border-radius: 16px;
    box-shadow: var(--shadow-sm);
  }
  .stat .num {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.6rem; font-weight: 700; line-height: 1;
  }
  .stat .label {
    font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.5px; margin-top: 4px; font-weight: 700;
  }
  .s-learned { color: var(--green); }
  .s-progress { color: var(--purple); }
  .s-total { color: var(--pink); }
  .s-streak { color: var(--orange); }

  .section-label {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 1px; font-weight: 600; margin: 22px 0 10px;
  }

  /* Word Cards */
  .word-card {
    background: var(--card); border-radius: 20px;
    padding: 16px 18px; margin-bottom: 12px;
    box-shadow: var(--shadow);
    border: 2px solid transparent;
    transition: all 0.25s ease;
  }
  .word-card:active { transform: scale(0.98); }
  .word-card.mastered {
    border-color: var(--green);
    background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
  }
  .word-top { display: flex; align-items: center; justify-content: space-between; }
  .word-text {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.4rem; font-weight: 600; color: var(--text);
  }
  .word-category {
    display: inline-block; font-size: 0.65rem; padding: 3px 10px; border-radius: 20px;
    background: var(--purple-light); color: var(--purple);
    font-weight: 700; margin-top: 4px;
  }
  .box-badge {
    font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; font-weight: 700;
  }

  .touches { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .touch-btn {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 14px 8px; border-radius: 16px;
    background: linear-gradient(135deg, #fdf2f8, #ede9fe);
    border: 2px solid var(--purple-light);
    cursor: pointer; transition: all 0.2s;
  }
  .touch-btn:active { transform: scale(0.92); }
  .touch-btn .t-icon { font-size: 1.6rem; }
  .touch-btn .t-label {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.7rem; color: var(--text-dim); font-weight: 600;
  }
  .touch-btn.done {
    background: linear-gradient(135deg, #d1fae5, #a7f3d0);
    border-color: var(--green);
  }
  .touch-btn.done .t-icon { animation: bounce 0.5s ease; }
  .touch-btn.done .t-label { color: #059669; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    40% { transform: translateY(-8px); }
    60% { transform: translateY(-3px); }
  }

  .word-expand {
    margin-top: 12px; padding: 16px; border-radius: 16px;
    background: linear-gradient(135deg, #fdf4ff, #f5f3ff);
    border: 1px solid var(--purple-light);
    animation: expandIn 0.3s ease;
  }
  @keyframes expandIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .word-expand .expand-label {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.8rem; color: var(--text-dim); text-align: center;
    font-weight: 600; margin-bottom: 8px;
  }
  .word-expand .expand-image {
    font-size: 5rem; text-align: center; margin: 10px 0;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .word-expand .expand-sentence {
    font-size: 1.05rem; text-align: center; margin: 10px 0;
    line-height: 1.6; color: var(--text);
  }
  .word-expand .expand-sentence b { color: var(--pink); font-weight: 800; }
  .speak-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin: 10px auto 0; padding: 10px 20px;
    background: linear-gradient(135deg, var(--blue-light), var(--purple-light));
    border: 2px solid var(--blue);
    color: var(--text); border-radius: 30px; font-size: 0.85rem;
    cursor: pointer; font-weight: 700; font-family: 'Nunito', sans-serif;
    transition: all 0.15s;
  }
  .speak-btn:active { transform: scale(0.95); }

  .assess-panel {
    margin-top: 12px; padding: 14px; border-radius: 16px;
    background: linear-gradient(135deg, #fffbeb, #fef3c7);
    border: 2px solid var(--yellow);
  }
  .assess-label {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.85rem; text-align: center; color: var(--text-dim);
    margin-bottom: 10px; font-weight: 600;
  }
  .review-btns { display: flex; gap: 8px; }
  .review-btn {
    flex: 1; padding: 14px 8px; border-radius: 16px;
    font-size: 0.9rem; font-weight: 700; cursor: pointer;
    border: none; color: #fff; transition: all 0.15s;
    font-family: 'Fredoka', sans-serif;
    box-shadow: var(--shadow-sm);
  }
  .review-btn:active { transform: scale(0.93); }
  .btn-forgot { background: linear-gradient(135deg, #f87171, #ef4444); }
  .btn-hard { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #7c2d12; }
  .btn-easy { background: linear-gradient(135deg, #34d399, #10b981); color: #064e3b; }

  /* Review overlay */
  .review-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(76, 29, 149, 0.85); backdrop-filter: blur(10px);
    z-index: 200; justify-content: center; align-items: center; padding: 20px;
  }
  .review-overlay.active { display: flex; }
  .review-card {
    background: var(--card); border-radius: 24px;
    padding: 24px; text-align: center; width: 100%; max-width: 440px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    animation: expandIn 0.3s ease;
  }
  .review-emoji {
    font-size: 6rem; margin: 16px 0;
    animation: pulse 2s ease-in-out infinite;
  }
  .review-word {
    font-family: 'Fredoka', sans-serif;
    font-size: 2.2rem; font-weight: 700; margin: 8px 0; color: var(--text);
  }
  .reveal-btn {
    width: 100%; padding: 16px; border-radius: 20px;
    font-size: 1.1rem; font-weight: 700; cursor: pointer;
    border: none; color: #fff; font-family: 'Fredoka', sans-serif;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    box-shadow: 0 4px 15px rgba(168,85,247,0.3);
    transition: all 0.15s;
  }
  .reveal-btn:active { transform: scale(0.96); }
  .review-dots {
    display: flex; justify-content: center; gap: 6px; margin: 12px 0;
  }
  .review-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--purple-light); transition: all 0.2s;
  }
  .review-dot.active { background: var(--purple); transform: scale(1.3); }
  .review-dot.done { background: var(--green); }
  .close-review {
    position: absolute; top: 16px; right: 20px;
    font-size: 1.5rem; cursor: pointer; color: #fff; opacity: 0.7;
    background: none; border: none; font-family: 'Fredoka', sans-serif;
  }

  /* Leitner Boxes */
  .leitner-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
  }
  .leitner-grid .box-card:last-child:nth-child(odd) {
    grid-column: 1 / -1;
  }
  .box-card {
    background: var(--card); border-radius: 16px; padding: 14px;
    box-shadow: var(--shadow-sm);
  }
  .box-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
  }
  .box-name {
    font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 0.9rem;
  }
  .box-count {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700; font-size: 0.75rem; padding: 3px 10px;
    border-radius: 20px; color: #fff;
  }
  .box-interval {
    font-size: 0.65rem; color: var(--text-muted); font-weight: 600; margin-bottom: 8px;
  }
  .word-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .word-chip {
    background: linear-gradient(135deg, #fdf4ff, #f5f3ff);
    border: 1px solid var(--purple-light);
    border-radius: 8px; padding: 3px 8px;
    font-size: 0.7rem; font-weight: 600;
  }
  .word-chip-more {
    background: linear-gradient(135deg, var(--pink-light), var(--purple-light));
    border: 1px solid var(--purple);
    border-radius: 8px; padding: 3px 8px;
    font-size: 0.7rem; font-weight: 700; color: var(--purple);
  }

  /* Mastery bar */
  .mastery-bar {
    display: flex; height: 28px; border-radius: 14px;
    overflow: hidden; margin-bottom: 6px;
    box-shadow: var(--shadow-sm);
  }
  .mastery-seg {
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 800; color: #fff;
    min-width: 24px; transition: width 0.5s ease;
  }

  /* Calendar */
  .mini-cal { display: flex; gap: 4px; flex-wrap: wrap; margin: 10px 0 16px; }
  .mini-day {
    width: 20px; height: 20px; border-radius: 6px;
    background: rgba(255,255,255,0.6); border: 1.5px solid var(--purple-light);
  }
  .mini-day.done {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    border-color: var(--purple);
  }
  .mini-day.partial {
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    border-color: var(--orange);
  }
  .mini-day.today { outline: 2.5px solid var(--pink); outline-offset: 1px; }

  /* Action cards */
  .action-card {
    background: var(--card); border-radius: 20px;
    padding: 16px; margin-bottom: 10px; text-align: center;
    cursor: pointer; box-shadow: var(--shadow-sm);
    transition: all 0.2s; border: 2px solid transparent;
  }
  .action-card:active { transform: scale(0.97); }
  .action-card .action-text {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.05rem; font-weight: 600;
  }
  .action-quiz { border-color: var(--yellow); }
  .action-quiz .action-text { color: #92400e; }
  .action-more { border-color: var(--pink); }
  .action-more .action-text { color: var(--pink); }
  .action-review { border-color: var(--purple); }
  .action-review .action-text { color: var(--purple); }

  .day-complete {
    text-align: center; padding: 18px; margin: 14px 0;
    background: linear-gradient(135deg, #fef3c7, #d1fae5);
    border-radius: 20px; border: 2px solid var(--green);
    font-family: 'Fredoka', sans-serif;
    font-weight: 700; font-size: 1.1rem; color: #065f46;
    display: none; box-shadow: var(--shadow);
  }
  .day-complete.show { display: block; animation: celebrateIn 0.5s ease; }
  @keyframes celebrateIn {
    from { opacity: 0; transform: scale(0.8) rotate(-2deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }

  /* Settings toggle */
  .settings-toggle {
    text-align: center; margin: 16px 0 8px;
  }
  .settings-toggle button {
    background: none; border: none; color: var(--text-muted);
    font-family: 'Fredoka', sans-serif; font-size: 0.85rem;
    cursor: pointer; font-weight: 600;
  }
  .settings-panel { display: none; }
  .settings-panel.open { display: block; }
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; background: var(--card);
    border-radius: 16px; margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
  }
  .setting-row .s-label {
    font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 0.95rem;
  }
  .setting-row .s-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; font-weight: 600; }
  .setting-row input[type=number] {
    background: var(--purple-light); border: 2px solid var(--purple);
    color: var(--text); padding: 8px 12px; border-radius: 12px;
    font-size: 0.9rem; width: 72px; text-align: center;
    font-family: 'Fredoka', sans-serif; font-weight: 700;
  }
  .reset-btn {
    width: 100%; padding: 14px; margin-top: 10px;
    background: var(--red-light); border: 2px solid var(--red);
    color: var(--red); border-radius: 16px;
    font-family: 'Fredoka', sans-serif; font-weight: 700;
    cursor: pointer; font-size: 0.95rem;
  }

  #confetti-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 999;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="header">
  <div style="position:relative;display:inline-block">
    <img src="avia-photo.jpg" alt="Avia" class="header-photo">
    <span style="position:absolute;top:-8px;right:-8px;font-size:2.2rem;transform:rotate(25deg);filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2))">👑</span>
  </div>
  <h1>🦄 Avia's Magic Words ✨</h1>
  <div class="subtitle">Hear 👂 · See 📸 · Use 🎮 · Do 🏃</div>
</div>

<div style="background:var(--card);border-radius:20px;padding:16px;margin:14px 0;box-shadow:var(--shadow);position:relative;z-index:1">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
    <div class="stat" style="padding:8px 4px;box-shadow:none"><div class="num s-learned" id="sLearned" style="font-size:1.4rem">0</div><div class="label">✅ Learned</div></div>
    <div class="stat" style="padding:8px 4px;box-shadow:none"><div class="num s-progress" id="sInProgress" style="font-size:1.4rem">0</div><div class="label">📖 Going</div></div>
    <div class="stat" style="padding:8px 4px;box-shadow:none"><div class="num s-total" id="sTotal" style="font-size:1.4rem">0</div><div class="label">📚 Total</div></div>
    <div class="stat" style="padding:8px 4px;box-shadow:none"><div class="num s-streak" id="sStreak" style="font-size:1.4rem">0</div><div class="label">🔥 Streak</div></div>
  </div>
  <div id="masteryBar" class="mastery-bar" style="margin-bottom:8px"></div>
  <div id="calendarBar"></div>
</div>

<div id="main-content"></div>

<!-- Review overlay (modal) -->
<div class="review-overlay" id="reviewOverlay">
  <button class="close-review" onclick="closeReview()">✕</button>
  <div id="reviewContent"></div>
</div>

// ============ STATE ============
let state = loadState();
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (s && s.words) {
      // Migration: add 'do' field if missing (pre-v2 state)
      for (const w of Object.values(s.words)) { if (w['do'] === undefined) w['do'] = false; }
      return s;
    }
  } catch {}
  return initState();
}
function initState() {
  return { words: {}, days: {}, settings: { wordsPerDay: 5, reviewCount: 5 }, startDate: todayStr() };
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function getTodayWords() {
  const today = todayStr();
  if (state.days[today]) return state.days[today].words;
  const introduced = new Set(Object.keys(state.words));
  const perDay = state.settings.wordsPerDay;
  const newWords = [];
  for (const entry of WORD_BANK) { if (newWords.length >= perDay) break; if (!introduced.has(entry.w)) newWords.push(entry.w); }
  for (const w of newWords) { if (!state.words[w]) state.words[w] = { box: 0, see: false, hear: false, use: false, do: false, introduced: today, lastReview: null, reviewCount: 0 }; }
  state.days[today] = { words: newWords, completed: false };
  save();
  return newWords;
}
function getWordEntry(w) { return WORD_BANK.find(e => e.w === w) || { w, c: '📚' }; }
function speak(word) {
  if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(word); u.lang='en-US'; u.rate=0.8; u.pitch=1.1; window.speechSynthesis.speak(u); }
}
function speakSentence(word) {
  const entry = getWordEntry(word);
  if (entry && entry.s) { const plain = entry.s.replace(/<[^>]+>/g,''); if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(plain); u.lang='en-US'; u.rate=0.75; u.pitch=1.1; window.speechSynthesis.speak(u); } }
}
function assessWord(word, quality) {
  const w = state.words[word]; if (!w) return;
  // Guard: only allow one assessment per day
  if (w.lastReview === todayStr()) return;
  if (quality === 'forgot') w.box = Math.max(0, w.box - 1);
  else if (quality === 'easy') w.box = Math.min(4, w.box + 1);
  w.lastReview = todayStr(); w.reviewCount++; save(); render();
}
function addMoreWords() {
  const today = todayStr();
  const introduced = new Set(Object.keys(state.words));
  const newWords = [];
  for (const entry of WORD_BANK) { if (newWords.length >= state.settings.wordsPerDay) break; if (!introduced.has(entry.w)) newWords.push(entry.w); }
  for (const w of newWords) { if (!state.words[w]) state.words[w] = { box: 0, see: false, hear: false, use: false, do: false, introduced: today, lastReview: null, reviewCount: 0 }; }
  if (state.days[today]) { state.days[today].words = state.days[today].words.concat(newWords); state.days[today].completed = false; }
  save(); render();
}

// ============ EXPAND / TOUCH ============
let expandedWord = null, expandedTouch = null;
function toggleTouch(word, touch) {
  if (!state.words[word]) return;
  if (touch === 'hear') speak(word);
  if (expandedWord === word && expandedTouch === touch) { expandedWord = null; expandedTouch = null; }
  else { expandedWord = word; expandedTouch = touch; }
  if (touch === 'do') state.words[word]['do'] = true; else state.words[word][touch] = true;
  const w = state.words[word];
  if (w.see && w.hear && w.use && w['do'] && w.box === 0) { w.box = 1; w.lastReview = todayStr(); }
  const todayWords = getTodayWords();
  const allDone = todayWords.every(tw => { const ws = state.words[tw]; return ws && ws.see && ws.hear && ws.use && ws['do']; });
  if (state.days[todayStr()]) state.days[todayStr()].completed = allDone;
  save(); render();
  if (allDone) launchConfetti();
}

// ============ LEITNER REVIEW ============
const BOX_INTERVALS = [1, 2, 4, 7, 14];
const BOX_LABELS = ['📦 New', '📖 Learning', '🔄 Familiar', '⭐ Almost', '✅ Mastered'];
function getReviewWords() {
  const today = todayStr();
  const todayWords = new Set(getTodayWords());
  const candidates = [];
  for (const [word, data] of Object.entries(state.words)) {
    if (todayWords.has(word)) continue;
    if (data.box === 0 && !(data.see && data.hear && data.use && data['do'])) continue;
    const interval = BOX_INTERVALS[data.box] || 14;
    if (data.lastReview) {
      const daysSince = Math.floor((new Date(today+'T12:00:00') - new Date(data.lastReview+'T12:00:00')) / 86400000);
      if (daysSince >= interval) candidates.push({ word, data, daysSince, overdue: daysSince - interval });
    } else if (data.see && data.hear && data.use && data['do']) { candidates.push({ word, data, daysSince: 999, overdue: 999 }); }
  }
  candidates.sort((a, b) => b.overdue - a.overdue || a.data.box - b.data.box);
  return candidates.slice(0, state.settings.reviewCount);
}

let reviewQueue = [], reviewIdx = 0, quizRevealed = false;
function openReview(queue) {
  reviewQueue = queue; reviewIdx = 0; quizRevealed = false;
  document.getElementById('reviewOverlay').classList.add('active');
  renderReviewCard();
}
function closeReview() {
  document.getElementById('reviewOverlay').classList.remove('active');
  reviewQueue = []; render();
}
function startReview() { openReview(getReviewWords()); }
function startTodayQuiz() {
  const words = getTodayWords().filter(tw => { const ws = state.words[tw]; return ws && ws.see && ws.hear && ws.use && ws['do']; });
  for (let i = words.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [words[i],words[j]]=[words[j],words[i]]; }
  openReview(words.map(w => ({ word: w, data: state.words[w] })));
}
function revealWord() { quizRevealed = true; renderReviewCard(); }
function reviewAnswer(quality) {
  if (reviewIdx >= reviewQueue.length) return;
  const { word } = reviewQueue[reviewIdx];
  const w = state.words[word];
  // Guard: only allow one assessment per day per word
  if (w.lastReview !== todayStr()) {
    if (quality === 'forgot') w.box = Math.max(0, w.box - 1);
    else if (quality === 'easy') w.box = Math.min(4, w.box + 1);
    w.lastReview = todayStr(); w.reviewCount++;
  }
  save();
  reviewIdx++; quizRevealed = false;
  if (reviewIdx >= reviewQueue.length) { launchConfetti(); setTimeout(closeReview, 1500); return; }
  renderReviewCard();
}
function renderReviewCard() {
  const el = document.getElementById('reviewContent');
  if (reviewQueue.length === 0 || reviewIdx >= reviewQueue.length) {
    el.innerHTML = `<div class="review-card"><div style="font-size:3.5rem;margin:16px 0">🎉</div><div style="font-family:'Fredoka',sans-serif;font-size:1.3rem;font-weight:700;color:var(--text)">All done! Great job! 🌟</div></div>`;
    return;
  }
  const { word, data } = reviewQueue[reviewIdx];
  const entry = getWordEntry(word);
  const safeW = word.replace(/'/g, "\\'");
  let dotsHTML = '<div class="review-dots">';
  for (let i = 0; i < reviewQueue.length; i++) { dotsHTML += `<div class="review-dot ${i < reviewIdx ? 'done' : i === reviewIdx ? 'active' : ''}"></div>`; }
  dotsHTML += '</div>';
  if (!quizRevealed) {
    el.innerHTML = `<div class="review-card">${dotsHTML}
      <div style="font-family:'Fredoka',sans-serif;font-size:0.9rem;color:var(--text-muted);margin-bottom:8px">${BOX_LABELS[data.box]}</div>
      <div style="font-family:'Fredoka',sans-serif;font-size:1rem;color:var(--text-dim)">🎯 What is this in English?</div>
      <div class="review-emoji">${entry.e || '❓'}</div>
      <div class="word-category" style="margin-bottom:16px">${entry.c}</div>
      <div style="font-size:0.9rem;color:var(--text-muted);margin-bottom:18px;font-weight:600">Ask Avia: "What is this?" 👆</div>
      <button class="reveal-btn" onclick="revealWord()">👀 Show Answer</button>
    </div>`;
  } else {
    const sentence = entry.s || '';
    const nextInterval = BOX_INTERVALS[Math.min(4, data.box + 1)];
    el.innerHTML = `<div class="review-card">${dotsHTML}
      <div style="font-size:4rem;margin:8px 0">${entry.e || '📦'}</div>
      <div class="review-word">${word}</div>
      <div style="margin:8px 0"><button class="speak-btn" onclick="speak('${safeW}')">🔊 Hear it</button></div>
      ${sentence ? `<div class="expand-sentence" style="font-size:0.95rem;margin:14px 0">${sentence}</div>` : ''}
      <div style="font-size:0.75rem;color:var(--text-muted);margin:12px 0 4px;font-weight:600">Reviewed ${data.reviewCount}× · Next: ${nextInterval} days if correct</div>
      <div style="font-family:'Fredoka',sans-serif;font-size:1rem;margin:14px 0 10px;color:var(--text)">Did Avia know it?</div>
      <div class="review-btns">
        <button class="review-btn btn-forgot" onclick="reviewAnswer('forgot')">😕 No<br><span style="font-size:0.6rem;opacity:0.7">→ Box ${Math.max(0, data.box-1)}</span></button>
        <button class="review-btn btn-hard" onclick="reviewAnswer('hard')">🤔 Almost<br><span style="font-size:0.6rem;opacity:0.7">→ Stay</span></button>
        <button class="review-btn btn-easy" onclick="reviewAnswer('easy')">😊 Yes!<br><span style="font-size:0.6rem;opacity:0.7">→ Box ${Math.min(4, data.box+1)}</span></button>
      </div>
    </div>`;
  }
}

// ============ STATS ============
function calcStats() {
  let learned = 0, inProgress = 0;
  for (const data of Object.values(state.words)) {
    if (data.box >= 3) learned++; else if (data.box > 0 || (data.see && data.hear && data.use)) inProgress++;
  }
  let streak = 0;
  const d = new Date(todayStr()+'T12:00:00');
  if (!state.days[todayStr()] || !state.days[todayStr()].completed) d.setDate(d.getDate()-1);
  while (true) {
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (state.days[ds] && state.days[ds].completed) { streak++; d.setDate(d.getDate()-1); } else break;
  }
  return { learned, inProgress, total: Object.keys(state.words).length, streak };
}

// ============ CONFETTI ============
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const particles = [];
  const shapes = ['⭐','✨','🌟','💖','🎉','🦋','🌸','💫'];
  for (let i = 0; i < 60; i++) {
    particles.push({ x: Math.random()*canvas.width, y: -20-Math.random()*200, size: 12+Math.random()*16, speed: 2+Math.random()*3, wobble: Math.random()*4-2, rotation: Math.random()*360, rotSpeed: Math.random()*6-3, shape: shapes[Math.floor(Math.random()*shapes.length)], opacity: 1 });
  }
  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of particles) {
      if (p.y > canvas.height+50) continue; alive = true;
      p.y += p.speed; p.x += Math.sin(frame*0.03+p.wobble)*1.5; p.rotation += p.rotSpeed;
      if (p.y > canvas.height-100) p.opacity = Math.max(0, p.opacity-0.02);
      ctx.save(); ctx.globalAlpha = p.opacity; ctx.translate(p.x, p.y); ctx.rotate(p.rotation*Math.PI/180);
      ctx.font = `${p.size}px serif`; ctx.textAlign = 'center'; ctx.fillText(p.shape, 0, 0); ctx.restore();
    }
    frame++;
    if (alive) requestAnimationFrame(animate); else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  animate();
}

// ============ RENDER (SINGLE PAGE) ============
function render() {
  const stats = calcStats();
  document.getElementById('sLearned').textContent = stats.learned;
  document.getElementById('sInProgress').textContent = stats.inProgress;
  document.getElementById('sTotal').textContent = stats.total;
  document.getElementById('sStreak').textContent = stats.streak;

  // Update mastery bar in header
  const boxes_h = [0,0,0,0,0];
  Object.values(state.words).forEach(d => boxes_h[d.box]++);
  const total_h = Object.keys(state.words).length || 1;
  const barColors_h = ['#f87171','#fb923c','#fbbf24','#60a5fa','#34d399'];
  let barHTML = '';
  for (let i = 0; i <= 4; i++) { const pct = (boxes_h[i]/total_h*100); if (pct > 0) barHTML += `<div class="mastery-seg" style="width:${pct}%;background:${barColors_h[i]}">${boxes_h[i]}</div>`; }
  document.getElementById('masteryBar').innerHTML = barHTML;

  const el = document.getElementById('main-content');
  let html = '';

  // === TODAY'S WORDS ===
  const words = getTodayWords();
  if (words.length > 0) {
    let allDone = true;
    html += '<div class="section-label">🌈 Today\'s New Words</div>';
    for (const w of words) {
      const ws = state.words[w] || {};
      const entry = getWordEntry(w);
      const done = ws.see && ws.hear && ws.use && ws['do'];
      if (!done) allDone = false;
      const safeW = w.replace(/'/g, "\\'");
      let expandHTML = '';
      if (expandedWord === w) {
        if (expandedTouch === 'see') {
          expandHTML = `<div class="word-expand"><div class="expand-label">📸 Look at this!</div><div class="expand-image">${entry.e||'📦'}</div><div style="text-align:center;font-family:'Fredoka',sans-serif;font-size:1.6rem;font-weight:700;margin-top:4px;color:var(--text)">${w}</div></div>`;
        } else if (expandedTouch === 'hear') {
          expandHTML = `<div class="word-expand"><div class="expand-label">👂 Listen and repeat!</div><div style="text-align:center;margin:16px 0"><span onclick="speak('${safeW}')" style="cursor:pointer;font-size:4rem;display:inline-block;animation:pulse 2s ease-in-out infinite">🔊</span></div><div style="text-align:center;font-family:'Fredoka',sans-serif;font-size:1.6rem;font-weight:700;color:var(--text)">${w}</div><button class="speak-btn" onclick="speak('${safeW}')">🔊 Tap to hear again</button></div>`;
        } else if (expandedTouch === 'use') {
          expandHTML = `<div class="word-expand"><div class="expand-label">🎮 Say this sentence!</div><div class="expand-sentence">${entry.s||'I see a <b>'+w+'</b>.'}</div><button class="speak-btn" onclick="speakSentence('${safeW}')">🔊 Hear the sentence</button></div>`;
        } else if (expandedTouch === 'do') {
          expandHTML = `<div class="word-expand" style="background:linear-gradient(135deg, #fef3c7, #ffedd5);border-color:var(--orange)"><div class="expand-label">🏃 Action time!</div><div style="text-align:center;font-size:3.5rem;margin:12px 0;animation:pulse 2s ease-in-out infinite">🎬</div><div style="text-align:center;font-family:'Fredoka',sans-serif;font-size:1.2rem;font-weight:700;color:#92400e;line-height:1.5;padding:0 8px">${entry.d||'Act it out!'}</div></div>`;
        }
      }
      html += `<div class="word-card ${done?'mastered':''}"><div class="word-top"><div><div class="word-text">${w}</div><div class="word-category">${entry.c}</div></div>${done && state.words[w] ? `<span class="box-badge" style="background:var(--green-light);color:#065f46">Box ${state.words[w].box}</span>` : ''}</div><div class="touches"><div class="touch-btn ${ws.hear?'done':''}" onclick="toggleTouch('${safeW}','hear')"><span class="t-icon">👂</span><span class="t-label">HEAR IT</span></div><div class="touch-btn ${ws.see?'done':''}" onclick="toggleTouch('${safeW}','see')"><span class="t-icon">📸</span><span class="t-label">SEE IT</span></div><div class="touch-btn ${ws.use?'done':''}" onclick="toggleTouch('${safeW}','use')"><span class="t-icon">🎮</span><span class="t-label">USE IT</span></div><div class="touch-btn ${ws['do']?'done':''}" onclick="toggleTouch('${safeW}','do')" style="${!ws['do']?'background:linear-gradient(135deg,#fef3c7,#ffedd5);border-color:var(--orange)':''}"><span class="t-icon">🏃</span><span class="t-label">DO IT</span></div></div>${expandHTML}</div>`;
    }
    html += `<div class="day-complete ${allDone?'show':''}">🌟💖 Amazing Avia! All words done! You're a star! 💖🌟</div>`;
    const learnedToday = words.filter(tw => { const ws = state.words[tw]; return ws && ws.see && ws.hear && ws.use && ws['do']; });
    if (learnedToday.length > 0) {
      html += `<div class="action-card action-quiz" onclick="startTodayQuiz()"><div class="action-text">🎯 Quiz Avia on today's words! (${learnedToday.length} ready)</div></div>`;
    }
    const introduced = new Set(Object.keys(state.words));
    if (WORD_BANK.some(e => !introduced.has(e.w))) {
      html += `<div class="action-card action-more" onclick="addMoreWords()"><div class="action-text">➕ Want more? Tap for ${state.settings.wordsPerDay} extra words!</div></div>`;
    }
  } else {
    html += '<div style="text-align:center;padding:30px;font-family:Fredoka,sans-serif;font-size:1.2rem;color:var(--text-dim)">🎉 All 500 words introduced!</div>';
  }

  // === REVIEW DUE ===
  const reviewWords = getReviewWords();
  if (reviewWords.length > 0) {
    html += `<div class="action-card action-review" onclick="startReview()" style="margin-top:16px"><div class="action-text">🔄 ${reviewWords.length} words ready for review — Tap to start!</div></div>`;
  }

  // === LEITNER BOXES ===
  const boxes = [0,0,0,0,0];
  const boxWords = [[],[],[],[],[]];
  Object.entries(state.words).forEach(([w,d]) => { boxes[d.box]++; boxWords[d.box].push(w); });
  const total = Object.keys(state.words).length || 1;
  const barColors = ['#f87171','#fb923c','#fbbf24','#60a5fa','#34d399'];
  const intervalLabels = ['daily','2 days','4 days','7 days','14 days'];
  const boxNames = ['New','Learning','Familiar','Almost','Mastered'];
  const boxIcons = ['📦','📖','🔄','⭐','✅'];

  if (Object.keys(state.words).length > 0) {
    html += '<div class="section-label">📦 Leitner Boxes</div><div class="leitner-grid">';
    for (let i = 0; i <= 4; i++) {
      const ws = boxWords[i];
      const shown = ws.slice(0, 6);
      const remaining = ws.length - shown.length;
      html += `<div class="box-card"><div class="box-header"><span class="box-name">${boxIcons[i]} Box ${i}</span><span class="box-count" style="background:${barColors[i]}">${boxes[i]}</span></div><div class="box-interval">${boxNames[i]} · ${intervalLabels[i]}</div><div class="word-chips">`;
      for (const w of shown) { const e = getWordEntry(w); html += `<span class="word-chip">${e.e||''} ${w}</span>`; }
      if (remaining > 0) html += `<span class="word-chip-more">+${remaining} more</span>`;
      if (ws.length === 0) html += `<span style="font-size:0.7rem;color:var(--text-muted);font-style:italic">Empty</span>`;
      html += '</div></div>';
    }
    html += '</div>';
  }

  // === CALENDAR (rendered into header) ===
  let calHTML = '';
  if (Object.keys(state.days).length > 0) {
    calHTML += '<div class="mini-cal" style="margin:6px 0 4px">';
    const today_c = new Date(todayStr()+'T12:00:00');
    for (let i = 29; i >= 0; i--) {
      const d = new Date(today_c); d.setDate(d.getDate()-i);
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      let cls = 'mini-day';
      if (ds === todayStr()) cls += ' today';
      if (state.days[ds] && state.days[ds].completed) cls += ' done';
      else if (state.days[ds]) cls += ' partial';
      calHTML += `<div class="${cls}" title="${ds}"></div>`;
    }
    calHTML += '</div>';
  }
  document.getElementById('calendarBar').innerHTML = calHTML;

  // === BROWSE ALL WORDS ===
  html += `<div class="section-label" style="cursor:pointer" onclick="document.getElementById('allWordsPanel').classList.toggle('open')">📚 All 500 Words ▾</div>`;
  html += `<div class="settings-panel" id="allWordsPanel">`;
  // Group by category
  const categories = {};
  WORD_BANK.forEach((entry, idx) => {
    if (!categories[entry.c]) categories[entry.c] = [];
    categories[entry.c].push(entry);
  });
  for (const [cat, catWords] of Object.entries(categories)) {
    const catLearned = catWords.filter(e => state.words[e.w] && state.words[e.w].box >= 3).length;
    const catIntro = catWords.filter(e => state.words[e.w]).length;
    html += `<div class="box-card" style="margin-bottom:10px">
      <div class="box-header">
        <span class="box-name">${cat}</span>
        <span style="font-size:0.7rem;color:var(--text-muted);font-weight:700">${catLearned}/${catWords.length} learned</span>
      </div>
      <div class="word-chips">`;
    for (const entry of catWords) {
      const ws = state.words[entry.w];
      let chipStyle = '';
      if (ws && ws.box >= 3) chipStyle = 'background:var(--green-light);border-color:var(--green);';
      else if (ws && ws.box >= 1) chipStyle = 'background:var(--yellow-light);border-color:var(--yellow);';
      else if (ws) chipStyle = 'background:var(--red-light);border-color:var(--red);';
      html += `<span class="word-chip" style="${chipStyle}">${entry.e} ${entry.w}</span>`;
    }
    html += `</div></div>`;
  }
  html += '</div>';

  // === SETTINGS (collapsible) ===
  html += `<div class="settings-toggle"><button onclick="document.getElementById('settingsPanel').classList.toggle('open')">⚙️ Settings</button></div>`;
  html += `<div class="settings-panel" id="settingsPanel">
    <div class="setting-row"><div><div class="s-label">Words per day</div><div class="s-desc">New words introduced daily</div></div><input type="number" min="1" max="20" value="${state.settings.wordsPerDay}" onchange="state.settings.wordsPerDay=parseInt(this.value)||5;save()"></div>
    <div class="setting-row"><div><div class="s-label">Review batch</div><div class="s-desc">Words per review session</div></div><input type="number" min="3" max="20" value="${state.settings.reviewCount}" onchange="state.settings.reviewCount=parseInt(this.value)||5;save()"></div>
    <div class="setting-row"><div><div class="s-label">Word bank</div><div class="s-desc">${WORD_BANK.length} words · ${Object.keys(state.words).length} introduced</div></div></div>
    <button class="reset-btn" onclick="if(confirm('Reset all progress?')){localStorage.removeItem(STORAGE_KEY);state=initState();save();render();}">🗑️ Reset All Progress</button>
  </div>`;

  el.innerHTML = html;
}

render();
</script>
