<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Insider Scanner</title>
<style>
:root {
  --bg: #0a0a0f;
  --card: #12121a;
  --border: #1e1e2e;
  --text: #e0e0e8;
  --dim: #6b6b80;
  --accent: #7c3aed;
  --critical: #ef4444;
  --high: #f97316;
  --medium: #eab308;
  --low: #22c55e;
  --blue: #3b82f6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'SF Pro', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* Header */
.header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
.header h1 { font-size: 28px; font-weight: 700; }
.header h1 span { color: var(--accent); }
.header .subtitle { color: var(--dim); font-size: 14px; }
.status-badge { display: inline-flex; align-items: center; gap: 6px; background: #16a34a15; color: #22c55e; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.status-badge .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--card); border-radius: 12px; padding: 4px; border: 1px solid var(--border); overflow-x: auto; }
.tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--dim); transition: all 0.2s; white-space: nowrap; border: none; background: none; }
.tab.active { background: var(--accent); color: white; }
.tab:hover:not(.active) { color: var(--text); background: #ffffff08; }

/* Tab Content */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Stats Row */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
.stat-card .value { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-card .label { font-size: 12px; color: var(--dim); margin-top: 4px; }

/* Signal Cards */
.signals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-bottom: 24px; }
.signal-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.signal-card .signal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.signal-card .signal-emoji { font-size: 28px; }
.signal-card .signal-name { font-size: 16px; font-weight: 600; }
.signal-card .signal-desc { color: var(--dim); font-size: 13px; line-height: 1.5; margin-bottom: 12px; }
.signal-card .signal-threshold { font-family: 'SF Mono', monospace; font-size: 13px; color: var(--blue); background: #3b82f610; padding: 6px 10px; border-radius: 6px; }

/* Alert List */
.alert-list { display: flex; flex-direction: column; gap: 12px; }
.alert-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: border-color 0.2s; }
.alert-item:hover { border-color: var(--accent); }
.alert-item.critical { border-left: 3px solid var(--critical); }
.alert-item.high { border-left: 3px solid var(--high); }
.alert-item.medium { border-left: 3px solid var(--medium); }
.alert-item.low { border-left: 3px solid var(--low); }
.alert-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
.alert-market { font-size: 15px; font-weight: 600; flex: 1; min-width: 200px; }
.alert-confidence { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.alert-confidence.critical { background: #ef444420; color: var(--critical); }
.alert-confidence.high { background: #f9731620; color: var(--high); }
.alert-confidence.medium { background: #eab30820; color: var(--medium); }
.alert-confidence.low { background: #22c55e20; color: var(--low); }
.alert-meta { display: flex; flex-wrap: wrap; gap: 12px; color: var(--dim); font-size: 13px; margin-bottom: 8px; }
.alert-signals { display: flex; flex-wrap: wrap; gap: 6px; }
.signal-tag { font-size: 11px; padding: 2px 8px; border-radius: 12px; background: #7c3aed15; color: var(--accent); font-weight: 500; }
.alert-details { font-size: 12px; color: var(--dim); margin-top: 8px; line-height: 1.6; }

/* Rules */
.rules-list { display: flex; flex-direction: column; gap: 16px; }
.rule-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.rule-item h3 { font-size: 15px; margin-bottom: 8px; }
.rule-item p { color: var(--dim); font-size: 13px; line-height: 1.6; }
.rule-item .evidence { margin-top: 8px; font-size: 12px; color: var(--blue); font-style: italic; }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: var(--dim); }
.empty .emoji { font-size: 48px; margin-bottom: 12px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 600px) {
  .container { padding: 12px; }
  .header h1 { font-size: 22px; }
  .signals-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>🔍 <span>Polymarket</span> Insider Scanner</h1>
      <div class="subtitle">Detecting informed money before the market moves</div>
    </div>
    <div class="status-badge"><div class="dot"></div>LIVE — scanning every 60s</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('alerts')">📡 Live Alerts</button>
    <button class="tab" onclick="showTab('paper')">📝 Paper Trades</button>
    <button class="tab" onclick="showTab('signals')">🎯 Detection Signals</button>
    <button class="tab" onclick="showTab('rules')">📋 Rules & Evidence</button>
    <button class="tab" onclick="showTab('stats')">📊 Stats</button>
  </div>

  <!-- ALERTS TAB -->
  <div id="tab-alerts" class="tab-content active">
    <div class="stats-row" id="alert-stats"></div>
    <div class="alert-list" id="alert-list">
      <div class="empty"><div class="emoji">📡</div>Loading alerts...</div>
    </div>
  </div>

  <!-- PAPER TRADES TAB -->
  <div id="tab-paper" class="tab-content">
    <div class="stats-row" id="paper-stats"></div>
    <div class="alert-list" id="paper-list">
      <div class="empty"><div class="emoji">📝</div>No paper trades yet. Waiting for first flagged trade to resolve...</div>
    </div>
  </div>

  <!-- SIGNALS TAB -->
  <div id="tab-signals" class="tab-content">
    <div class="signals-grid" id="signals-grid"></div>
  </div>

  <!-- RULES TAB -->
  <div id="tab-rules" class="tab-content">
    <div class="rules-list" id="rules-list"></div>
  </div>

  <!-- STATS TAB -->
  <div id="tab-stats" class="tab-content">
    <div class="stats-row" id="global-stats"></div>
    <div id="stats-detail"></div>
  </div>
</div>

<script>
// ── Data ──
const SIGNALS = [
  { emoji: "🆕", name: "Fresh Wallet", key: "FRESH_WALLET",
    desc: "Wallet has ≤5 prior trades on Polymarket. Insiders create throwaway wallets to hide identity.",
    threshold: "≤ 5 lifetime trades", weight: "High" },
  { emoji: "👶", name: "New Wallet", key: "NEW_WALLET",
    desc: "Wallet first appeared on Polymarket less than 24 hours ago. Venezuelan insiders' wallets were <1 day old.",
    threshold: "< 24 hours old", weight: "High" },
  { emoji: "🔬", name: "Few Markets", key: "FEW_MARKETS",
    desc: "Wallet only trades 1-3 very specific markets. Normal gamblers diversify across many markets. Insiders laser-focus on what they know.",
    threshold: "≤ 3 unique markets", weight: "High" },
  { emoji: "🎰", name: "Concentrated", key: "CONCENTRATED",
    desc: "Over 80% of wallet's total value is in a single market. All-in behavior — extreme conviction or inside knowledge.",
    threshold: "> 80% in one market", weight: "Medium" },
  { emoji: "📊", name: "Unusual Sizing", key: "UNUSUAL_SIZE",
    desc: "Trade represents more than 2% of the market's entire 24-hour volume. Informed traders bet big when they have edge.",
    threshold: "> 2% of 24h volume", weight: "High" },
  { emoji: "🎯", name: "Niche Market", key: "NICHE_MARKET",
    desc: "Market has less than $50K daily volume. Easier to have insider info on obscure events than on 'Will BTC hit $100K?'",
    threshold: "< $50K daily volume", weight: "Medium" },
  { emoji: "⏰", name: "Pre-Event Timing", key: "PRE_EVENT",
    desc: "Trade placed within 72 hours of market resolution. Insiders position hours to days before the event, not weeks.",
    threshold: "< 72 hours to resolution", weight: "Medium" }
];

const RULES = [
  { title: "🎯 Minimum Trade Size: $10,000",
    text: "Only trades ≥$10K are analyzed. Real insiders don't bet $700 — the Venezuelan insiders bet $10K+ per position. The OpenAI browser insider bet $40K.",
    evidence: "Venezuelan Maduro case: 3 wallets, $630K profit from $10K+ bets each." },
  { title: "🧮 Alert Threshold: 2+ Signals",
    text: "A trade must trigger at least 2 of the 7 signals to generate an alert. Single signals produce too many false positives.",
    evidence: "Polysights Insider Finder reports 85% accuracy with multi-signal approach." },
  { title: "📊 Confidence Levels",
    text: "LOW (2 signals) → MEDIUM (3) → HIGH (4) → CRITICAL (5+). The Venezuelan insider wallets would score 5-6/7 — fresh, new, few markets, concentrated, niche, pre-event.",
    evidence: "Venezuelan pattern: <1 day old, 2-3 markets, >$10K bets, positioned hours before event." },
  { title: "🚫 Yield Farming Filter",
    text: "Buying NO at >$0.95 is filtered out. That's just collecting near-certain pennies on resolved markets — not insider behavior.",
    evidence: "Common false positive pattern on near-expiry markets." },
  { title: "🏆 The Venezuelan Pattern (Gold Standard)",
    text: "The most documented Polymarket insider case: 3 wallets made $630K betting on Maduro's removal. Pattern: wallet age <1 day, only 2-3 specific markets, single bets >$10K, positions completed hours before event, zero diversification.",
    evidence: "Flagged by Polysights, covered by Gizmodo, TradeAlgo, RootData. Led to Congressional scrutiny." },
  { title: "🌐 The OpenAI Browser Case",
    text: "Polysights flagged a $40K wager from a newly created wallet betting OpenAI would launch a web browser. It happened. Classic fresh wallet + large bet + specific market.",
    evidence: "Reported by Gizmodo Jan 2026. Wallet created shortly before the bet." },
  { title: "📡 Data Sources",
    text: "All data comes from Polymarket's public APIs (Data API + Gamma API). No authentication needed. No Polygon RPC (yet). No third-party code — 100% built in-house.",
    evidence: "Polymarket Data API: trades, activity, positions. Gamma API: market metadata, volume, end dates." },
  { title: "⚠️ Important Limitations",
    text: "Not every alert is an insider. Fresh wallets can be new users, arbitrage bots, or people who just made their first big bet. Sports markets have higher false positive rates. This is a signal, not proof.",
    evidence: "Polysights disclaimer: 'Transactions listed here do not guarantee insider activity.'" }
];

let alerts = [];
let paperTrades = [];

// ── Rendering ──
function renderSignals() {
  const grid = document.getElementById('signals-grid');
  grid.innerHTML = SIGNALS.map(s => `
    <div class="signal-card">
      <div class="signal-header">
        <div class="signal-emoji">${s.emoji}</div>
        <div class="signal-name">${s.name}</div>
      </div>
      <div class="signal-desc">${s.desc}</div>
      <div class="signal-threshold">Threshold: ${s.threshold}</div>
    </div>
  `).join('');
}

function renderRules() {
  const list = document.getElementById('rules-list');
  list.innerHTML = RULES.map(r => `
    <div class="rule-item">
      <h3>${r.title}</h3>
      <p>${r.text}</p>
      <div class="evidence">📎 ${r.evidence}</div>
    </div>
  `).join('');
}

function renderAlerts() {
  const list = document.getElementById('alert-list');
  const statsDiv = document.getElementById('alert-stats');

  if (alerts.length === 0) {
    list.innerHTML = '<div class="empty"><div class="emoji">🔍</div>No alerts yet. Scanner is watching...</div>';
    statsDiv.innerHTML = '';
    return;
  }

  // Sort by timestamp descending
  const sorted = [...alerts].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  // Stats
  const total = sorted.length;
  const critical = sorted.filter(a => a.confidence === 'CRITICAL').length;
  const high = sorted.filter(a => a.confidence === 'HIGH').length;
  const medium = sorted.filter(a => a.confidence === 'MEDIUM').length;
  const totalUsd = sorted.reduce((s, a) => s + (a.size_usd || 0), 0);

  statsDiv.innerHTML = `
    <div class="stat-card"><div class="value">${total}</div><div class="label">Total Alerts</div></div>
    <div class="stat-card"><div class="value" style="color:var(--critical)">${critical}</div><div class="label">Critical</div></div>
    <div class="stat-card"><div class="value" style="color:var(--high)">${high}</div><div class="label">High</div></div>
    <div class="stat-card"><div class="value" style="color:var(--medium)">${medium}</div><div class="label">Medium</div></div>
    <div class="stat-card"><div class="value">$${(totalUsd/1000).toFixed(0)}K</div><div class="label">Total Flagged $</div></div>
  `;

  const signalEmojis = { FRESH_WALLET:'🆕', UNUSUAL_SIZE:'📊', NICHE_MARKET:'🎯', CONCENTRATED:'🎰', FEW_MARKETS:'🔬', NEW_WALLET:'👶', PRE_EVENT:'⏰' };

  list.innerHTML = sorted.map(a => {
    const conf = (a.confidence || 'low').toLowerCase();
    const ts = new Date(a.timestamp);
    const timeStr = ts.toLocaleString();
    const details = a.details || {};
    let detailParts = [];
    if (details.wallet_trade_count !== undefined) detailParts.push(`${details.wallet_trade_count} prior trades`);
    if (details.wallet_market_count) detailParts.push(`${details.wallet_market_count} markets`);
    if (details.wallet_age_hours !== undefined) {
      const h = details.wallet_age_hours;
      detailParts.push(h < 1 ? `${Math.round(h*60)}min old` : `${Math.round(h)}h old`);
    }
    if (details.size_ratio) detailParts.push(`${details.size_ratio}% of 24h vol`);
    if (details.concentration) detailParts.push(`${details.concentration}% concentrated`);
    if (details.hours_to_event) {
      const h = details.hours_to_event;
      detailParts.push(h < 24 ? `${Math.round(h)}h to event` : `${(h/24).toFixed(1)}d to event`);
    }

    const polyUrl = a.event_slug ? `https://polymarket.com/event/${a.event_slug}` : (a.market_slug ? `https://polymarket.com/event/${a.market_slug}` : '');

    return `
      <div class="alert-item ${conf}">
        <div class="alert-top">
          <div class="alert-market">${a.market || 'Unknown'}</div>
          <span class="alert-confidence ${conf}">${a.confidence} (${a.signal_count}/7)</span>
        </div>
        <div class="alert-meta">
          <span>💰 $${(a.size_usd||0).toLocaleString()}</span>
          <span>📈 ${a.side} ${a.outcome || ''} @ $${a.price}</span>
          <span>👛 ${a.wallet_short || a.pseudonym || '?'}</span>
          <span>🕐 ${timeStr}</span>
        </div>
        <div class="alert-signals">
          ${(a.signals||[]).map(s => `<span class="signal-tag">${signalEmojis[s]||'⚠️'} ${s.replace(/_/g,' ')}</span>`).join('')}
        </div>
        <div class="alert-details">${detailParts.join(' • ')}</div>
        ${polyUrl ? `<div style="margin-top:8px"><a href="${polyUrl}" target="_blank" style="color:var(--blue);font-size:12px">🔗 View on Polymarket</a></div>` : ''}
      </div>
    `;
  }).join('');
}

function renderStats() {
  const statsDiv = document.getElementById('global-stats');
  const detailDiv = document.getElementById('stats-detail');

  if (alerts.length === 0) {
    statsDiv.innerHTML = '<div class="empty"><div class="emoji">📊</div>No data yet</div>';
    return;
  }

  // Signal frequency
  const signalCounts = {};
  SIGNALS.forEach(s => signalCounts[s.key] = 0);
  alerts.forEach(a => (a.signals || []).forEach(s => { signalCounts[s] = (signalCounts[s] || 0) + 1; }));

  const avgSignals = alerts.length > 0 ? (alerts.reduce((s,a) => s + (a.signal_count||0), 0) / alerts.length).toFixed(1) : '0';
  const topMarket = {};
  alerts.forEach(a => { topMarket[a.market] = (topMarket[a.market]||0) + 1; });
  const mostFlagged = Object.entries(topMarket).sort((a,b) => b[1]-a[1])[0];

  statsDiv.innerHTML = `
    <div class="stat-card"><div class="value">${alerts.length}</div><div class="label">All-Time Alerts</div></div>
    <div class="stat-card"><div class="value">${avgSignals}</div><div class="label">Avg Signals/Alert</div></div>
    <div class="stat-card"><div class="value">$10K</div><div class="label">Min Trade Size</div></div>
    <div class="stat-card"><div class="value">7</div><div class="label">Detection Signals</div></div>
  `;

  detailDiv.innerHTML = `
    <h3 style="margin:24px 0 12px;font-size:16px">Signal Frequency</h3>
    <div class="signals-grid">
      ${SIGNALS.map(s => `
        <div class="signal-card">
          <div class="signal-header">
            <div class="signal-emoji">${s.emoji}</div>
            <div class="signal-name">${s.name}</div>
          </div>
          <div style="font-size:32px;font-weight:700;color:var(--accent)">${signalCounts[s.key] || 0}</div>
          <div style="color:var(--dim);font-size:12px;margin-top:4px">times triggered</div>
        </div>
      `).join('')}
    </div>
    ${mostFlagged ? `<div class="rule-item" style="margin-top:24px"><h3>🏆 Most Flagged Market</h3><p>${mostFlagged[0]} (${mostFlagged[1]} alerts)</p></div>` : ''}
  `;
}

function renderPaperTrades() {
  const list = document.getElementById('paper-list');
  const statsDiv = document.getElementById('paper-stats');

  if (paperTrades.length === 0) {
    list.innerHTML = '<div class="empty"><div class="emoji">📝</div>No paper trades yet. Waiting for first flagged trade...</div>';
    statsDiv.innerHTML = '';
    return;
  }

  const sorted = [...paperTrades].sort((a, b) => new Date(b.flagged_at) - new Date(a.flagged_at));
  const resolved = sorted.filter(t => t.resolved);
  const pending = sorted.filter(t => !t.resolved);
  const correct = resolved.filter(t => t.outcome_correct);
  const wrong = resolved.filter(t => !t.outcome_correct);
  const winRate = resolved.length > 0 ? (correct.length / resolved.length * 100).toFixed(0) : '—';
  const totalPnL = resolved.reduce((s, t) => s + (t.profit_usd || 0), 0);
  const totalRisked = sorted.reduce((s, t) => s + (t.size_usd || 0), 0);

  statsDiv.innerHTML = `
    <div class="stat-card"><div class="value">${sorted.length}</div><div class="label">Total Tracked</div></div>
    <div class="stat-card"><div class="value">${pending.length}</div><div class="label">⏳ Pending</div></div>
    <div class="stat-card"><div class="value" style="color:${winRate !== '—' && parseInt(winRate) >= 50 ? '#22c55e' : winRate === '—' ? 'var(--accent)' : '#ef4444'}">${winRate}%</div><div class="label">Hit Rate</div></div>
    <div class="stat-card"><div class="value" style="color:${totalPnL >= 0 ? '#22c55e' : '#ef4444'}">$${totalPnL >= 0 ? '+' : ''}${totalPnL.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="label">Paper P&L</div></div>
    <div class="stat-card"><div class="value">$${(totalRisked/1000).toFixed(0)}K</div><div class="label">Total Risked</div></div>
  `;

  const signalEmojis = { FRESH_WALLET:'🆕', UNUSUAL_SIZE:'📊', NICHE_MARKET:'🎯', CONCENTRATED:'🎰', FEW_MARKETS:'🔬', NEW_WALLET:'👶', PRE_EVENT:'⏰' };

  list.innerHTML = sorted.map(t => {
    const isResolved = t.resolved;
    const isCorrect = t.outcome_correct;
    let statusBadge, borderClass;
    if (!isResolved) {
      statusBadge = '<span class="alert-confidence medium">⏳ PENDING</span>';
      borderClass = 'medium';
    } else if (isCorrect) {
      statusBadge = `<span class="alert-confidence" style="background:#22c55e20;color:#22c55e">✅ CORRECT +$${(t.profit_usd||0).toLocaleString()}</span>`;
      borderClass = 'low';
    } else {
      statusBadge = `<span class="alert-confidence" style="background:#ef444420;color:#ef4444">❌ WRONG $${(t.profit_usd||0).toLocaleString()}</span>`;
      borderClass = 'critical';
    }

    const conf = (t.confidence || 'low').toLowerCase();
    const ts = new Date(t.flagged_at);
    const polyUrl = t.event_slug ? `https://polymarket.com/event/${t.event_slug}` : '';

    return `
      <div class="alert-item ${borderClass}">
        <div class="alert-top">
          <div class="alert-market">${t.market || 'Unknown'}</div>
          ${statusBadge}
        </div>
        <div class="alert-meta">
          <span>💰 $${(t.size_usd||0).toLocaleString()}</span>
          <span>📈 ${t.side} ${t.outcome_bet || ''} @ $${t.entry_price}</span>
          <span>👛 ${t.wallet || '?'}</span>
          <span>🏷️ ${t.confidence} (${t.signal_count}/7)</span>
          <span>🕐 ${ts.toLocaleDateString()}</span>
        </div>
        <div class="alert-signals">
          ${(t.signals||[]).map(s => `<span class="signal-tag">${signalEmojis[s]||'⚠️'} ${s.replace(/_/g,' ')}</span>`).join('')}
        </div>
        ${isResolved ? `<div class="alert-details" style="margin-top:8px">ROI: ${(t.roi_pct||0) >= 0 ? '+' : ''}${t.roi_pct||0}% • Resolved: ${new Date(t.resolved_at).toLocaleDateString()}</div>` : ''}
        ${polyUrl ? `<div style="margin-top:8px"><a href="${polyUrl}" target="_blank" style="color:var(--blue);font-size:12px">🔗 View on Polymarket</a></div>` : ''}
      </div>
    `;
  }).join('');
}

// ── Tab switching ──
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'stats') renderStats();
  if (name === 'paper') renderPaperTrades();
}

// ── Load data ──
async function loadAlerts() {
  try {
    const resp = await fetch('polymarket-alerts.json?t=' + Date.now());
    if (resp.ok) {
      alerts = await resp.json();
      renderAlerts();
    }
  } catch(e) {
    console.log('No alerts file yet');
  }
}

async function loadPaperTrades() {
  try {
    const resp = await fetch('polymarket-paper-trades.json?t=' + Date.now());
    if (resp.ok) {
      paperTrades = await resp.json();
      // Re-render if on paper tab
      if (document.getElementById('tab-paper').classList.contains('active')) {
        renderPaperTrades();
      }
    }
  } catch(e) {
    console.log('No paper trades file yet');
  }
}

// ── Init ──
renderSignals();
renderRules();
loadAlerts();
loadPaperTrades();

// Auto-refresh every 5 minutes
setInterval(() => { loadAlerts(); loadPaperTrades(); }, 300000);
</script>
</body>
</html>
